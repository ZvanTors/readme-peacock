name: 🦚 Generate Landing Page with readme-peacock

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # اجازهٔ اجرای دستی هم بده

# مجوزهای لازم برای انتشار روی Pages
permissions:
  contents: read
  pages: write
  id-token: write

# فقط یک اجرا در هر زمان مجاز است
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install readme-peacock
        run: pip install readme-peacock

      - name: 🏗️ Build landing page
        run: peacock --repo "${{ github.repository }}" -o _site/index.html

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site/'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4